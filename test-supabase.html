<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supabase Broadcast Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; background: #0f1419; color: #e2ddd6; padding: 32px; max-width: 600px; margin: 0 auto; }
        h2 { color: #7c9a8e; }
        .status { padding: 12px 16px; border-radius: 8px; margin: 8px 0; font-size: 0.95rem; }
        .ok   { background: rgba(138,184,160,0.12); border-left: 3px solid #8ab8a0; color: #8ab8a0; }
        .err  { background: rgba(201,139,123,0.12); border-left: 3px solid #c98b7b; color: #c98b7b; }
        .info { background: rgba(124,154,142,0.08); border-left: 3px solid #7c9a8e; color: #9ab8ac; }
        button { margin-top: 20px; padding: 12px 28px; background: #5a7a6e; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #7c9a8e; }
        #log { margin-top: 24px; }
    </style>
</head>
<body>
    <h2>◈ Supabase Broadcast Test</h2>
    <p style="color:#6e6a66;">Open this page in <strong style="color:#c4a882;">two browser tabs</strong>. Click Send in one tab and watch the other receive it.</p>

    <button onclick="sendPing()">Send Test Ping</button>

    <div id="log"></div>

    <script>
        const SUPABASE_URL = 'https://tseagsdutcihhisxyuur.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_qq98Hby7TwYNHxvUc8O3hA_Tybhi6OX';

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const myId = 'test_' + Math.random().toString(36).substr(2, 5);

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'status ' + type;
            div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            document.getElementById('log').prepend(div);
        }

        log('My ID: ' + myId);
        log('Connecting to Supabase...');

        const channel = client.channel('zenith_broadcast_test', {
            config: { broadcast: { self: false } }
        });

        channel
            .on('broadcast', { event: 'ping' }, function({ payload }) {
                log('RECEIVED ping from ' + payload.from + ' → "' + payload.msg + '"', 'ok');
            })
            .subscribe(function(status) {
                if (status === 'SUBSCRIBED') {
                    log('Connected! Status: SUBSCRIBED ✓', 'ok');
                } else if (status === 'CHANNEL_ERROR') {
                    log('Connection FAILED — check your URL and anon key', 'err');
                } else {
                    log('Status: ' + status);
                }
            });

        function sendPing() {
            channel.send({
                type: 'broadcast',
                event: 'ping',
                payload: { from: myId, msg: 'Hello from Tab ' + myId }
            }).then(function(resp) {
                if (resp === 'ok') {
                    log('Sent ping successfully ✓', 'ok');
                } else {
                    log('Send failed: ' + JSON.stringify(resp), 'err');
                }
            });
        }
    </script>
</body>
</html>
