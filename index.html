<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-icon">◈</span>
            <span class="brand-text">Zenith</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="rooms.html">Rooms</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <button class="login-btn" onclick="openModal('loginModal')">Login</button>
    </nav>

    <!-- Hero Section -->
    <main class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Zenith</h1>
            <p class="hero-subtitle">Elevate Your Digital Experience</p>
            <a href="rooms.html" class="enter-btn">ENTER</a>
        </div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="brand-icon">◈</span>
                <span>Zenith</span>
            </div>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Support</a>
            </div>
            <p class="footer-copy">©️ 2026 Zenith. All rights reserved.</p>
        </div>
    </footer>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal" onclick="closeModal(event, 'loginModal')">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal(null, 'loginModal')">×</button>
            <div class="modal-header">
                <span class="modal-icon">◈</span>
                <h2>Welcome Back</h2>
                <p>Sign in to your Zenith account</p>
            </div>
            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot">Forgot password?</a>
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>
            <div class="modal-footer">
                <p>Don't have an account? <a href="#">Create one</a></p>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event, id) {
            if (!event || event.target === document.getElementById(id) || event.target.classList.contains('modal-close')) {
                document.getElementById(id).classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            alert('Welcome, ' + email + '! Login successful.');
            closeModal(null, 'loginModal');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => {
                    m.classList.remove('active');
                });
                document.body.style.overflow = '';
            }
        });
    </script>

</body>
</html>
